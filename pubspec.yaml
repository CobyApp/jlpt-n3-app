name: jlpt_n3_app
description: "JLPT N3 학습 앱 — 회차별 풀이, 영역별 모아풀기, 청해, 단어장."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  just_audio: ^0.9.42
  audio_session: ^0.1.21
  html: ^0.15.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#22C55E"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/data/exams/
    - assets/audio/n3_2017-12/
    - assets/audio/n3_2018-07/
    - assets/audio/n3_2018-12/
    - assets/audio/n3_2018-vol2/
    - assets/audio/n3_2019-07/
    - assets/audio/n3_2019-12/
    - assets/audio/n3_2020-12/
    - assets/audio/n3_2021-07/
    - assets/audio/n3_2021-12/
    - assets/audio/n3_2022-07/
    - assets/audio/n3_2022-12/
    - assets/audio/n3_2023-07/
    - assets/audio/n3_2023-12/
    - assets/audio/n3_2024-07/
    - assets/audio/n3_2024-12/
    - assets/audio/n3_2025-07/
